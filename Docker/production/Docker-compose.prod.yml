version: '3.9'
services:
  taskflow-prod:
    build:
      context: ../../
      dockerfile: Docker/production/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
 
    ports:
      - "3000:3000"
  
    env_file:
      - ../../.env  
    restart: always
    